<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orts Viewer</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: sans-serif;
      }
      canvas {
        display: block;
      }
      .ui-overlay {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .load-csv-btn {
        padding: 8px 16px;
        background: rgba(34, 85, 170, 0.85);
        color: #fff;
        border: 1px solid rgba(68, 136, 204, 0.6);
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      .load-csv-btn:hover {
        background: rgba(34, 85, 170, 1.0);
      }
      .orbit-info {
        color: #aac;
        font-size: 12px;
        background: rgba(0, 0, 0, 0.5);
        padding: 4px 8px;
        border-radius: 4px;
      }

      /* --- Playback controls --- */
      .playback-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 10px 16px 12px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(6px);
        border-top: 1px solid rgba(68, 136, 204, 0.3);
        color: #ccd;
        font-size: 13px;
      }

      /* Slider row */
      .playback-slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .time-slider {
        flex: 1;
        height: 6px;
        -webkit-appearance: none;
        appearance: none;
        background: rgba(68, 136, 204, 0.3);
        border-radius: 3px;
        outline: none;
        cursor: pointer;
      }
      .time-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #4488cc;
        cursor: pointer;
      }
      .time-slider::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #4488cc;
        border: none;
        cursor: pointer;
      }

      /* Controls row */
      .playback-controls-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .play-pause-btn {
        padding: 4px 14px;
        background: rgba(34, 85, 170, 0.85);
        color: #fff;
        border: 1px solid rgba(68, 136, 204, 0.6);
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        min-width: 60px;
      }
      .play-pause-btn:hover {
        background: rgba(34, 85, 170, 1.0);
      }
      .speed-select {
        padding: 4px 8px;
        background: rgba(20, 20, 40, 0.85);
        color: #ccd;
        border: 1px solid rgba(68, 136, 204, 0.4);
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
      }
      .time-display {
        color: #8af;
        font-family: monospace;
        font-size: 13px;
        min-width: 180px;
      }
      .mode-indicator {
        margin-left: auto;
        padding: 2px 10px;
        background: rgba(0, 180, 100, 0.25);
        border: 1px solid rgba(0, 180, 100, 0.5);
        border-radius: 3px;
        color: #0b4;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* --- Mode toggle (Replay / Realtime) --- */
      .mode-toggle {
        display: flex;
        gap: 0;
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid rgba(68, 136, 204, 0.5);
      }
      .mode-toggle-btn {
        padding: 6px 16px;
        background: rgba(20, 20, 40, 0.85);
        color: #8899bb;
        border: none;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.15s, color 0.15s;
      }
      .mode-toggle-btn:hover {
        background: rgba(34, 55, 100, 0.85);
        color: #bbc;
      }
      .mode-toggle-btn.active {
        background: rgba(34, 85, 170, 0.85);
        color: #fff;
      }

      /* --- Realtime WebSocket controls --- */
      .realtime-controls {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .ws-url-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .ws-url-input {
        flex: 1;
        padding: 6px 10px;
        background: rgba(20, 20, 40, 0.85);
        color: #ccd;
        border: 1px solid rgba(68, 136, 204, 0.4);
        border-radius: 4px;
        font-size: 13px;
        font-family: monospace;
        min-width: 200px;
      }
      .ws-url-input:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .ws-url-input:focus {
        outline: none;
        border-color: rgba(68, 136, 204, 0.8);
      }
      .ws-btn {
        padding: 6px 14px;
        border: 1px solid;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }
      .ws-connect-btn {
        background: rgba(0, 140, 80, 0.85);
        color: #fff;
        border-color: rgba(0, 180, 100, 0.6);
      }
      .ws-connect-btn:hover {
        background: rgba(0, 160, 90, 1.0);
      }
      .ws-disconnect-btn {
        background: rgba(170, 50, 50, 0.85);
        color: #fff;
        border-color: rgba(200, 60, 60, 0.6);
      }
      .ws-disconnect-btn:hover {
        background: rgba(190, 60, 60, 1.0);
      }

      /* --- WebSocket connection status --- */
      .ws-status {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .ws-status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .ws-status-dot.connected {
        background: #0c6;
        box-shadow: 0 0 4px #0c6;
      }
      .ws-status-dot.disconnected {
        background: #666;
      }
      .ws-status-text {
        color: #8899bb;
        font-size: 12px;
      }

      /* --- Graph panel (right side) --- */
      .graph-panel {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 360px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        background: rgba(0, 0, 10, 0.85);
        backdrop-filter: blur(6px);
        border-left: 1px solid rgba(68, 136, 204, 0.3);
        overflow-y: auto;
        transition: width 0.2s ease;
      }
      .graph-panel.collapsed {
        width: 40px;
        overflow: hidden;
      }
      .graph-panel-toggle {
        padding: 8px;
        background: rgba(34, 85, 170, 0.6);
        color: #fff;
        border: none;
        border-bottom: 1px solid rgba(68, 136, 204, 0.3);
        cursor: pointer;
        font-size: 12px;
        text-align: center;
      }
      .graph-panel-toggle:hover {
        background: rgba(34, 85, 170, 0.85);
      }
      .graph-panel-content {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 8px;
      }
      .graph-loading {
        color: #8899bb;
        font-size: 12px;
        text-align: center;
        padding: 12px;
      }
      .time-range-selector {
        display: flex;
        gap: 4px;
        padding: 0 0 4px;
      }
      .time-range-btn {
        flex: 1;
        padding: 3px 0;
        font-size: 11px;
        background: rgba(255, 255, 255, 0.08);
        color: #aaa;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 3px;
        cursor: pointer;
      }
      .time-range-btn.active {
        background: rgba(34, 85, 170, 0.6);
        color: #fff;
        border-color: rgba(68, 136, 204, 0.6);
      }
      .time-range-btn:hover {
        background: rgba(34, 85, 170, 0.4);
        color: #ddd;
      }

      /* --- uPlot dark theme overrides --- */
      .u-wrap {
        background: transparent !important;
      }
      .u-title {
        color: #aac !important;
        font-size: 11px !important;
      }
      .u-legend {
        display: none;
      }
      .u-select {
        background: rgba(68, 136, 204, 0.15) !important;
      }

      /* --- App root (D&D container) --- */
      .app-root {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      /* --- Drop overlay --- */
      .drop-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(34, 85, 170, 0.3);
        border: 3px dashed rgba(68, 136, 204, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .drop-overlay-text {
        color: #fff;
        font-size: 24px;
        background: rgba(0, 0, 0, 0.6);
        padding: 16px 32px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
