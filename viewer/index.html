<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orts Viewer</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: sans-serif;
      }
      canvas {
        display: block;
      }
      #ui-overlay {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #load-csv-btn {
        padding: 8px 16px;
        background: rgba(34, 85, 170, 0.85);
        color: #fff;
        border: 1px solid rgba(68, 136, 204, 0.6);
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      #load-csv-btn:hover {
        background: rgba(34, 85, 170, 1.0);
      }
      #orbit-info {
        color: #aac;
        font-size: 12px;
        background: rgba(0, 0, 0, 0.5);
        padding: 4px 8px;
        border-radius: 4px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="ui-overlay">
      <button id="load-csv-btn">Load Orbit CSV</button>
      <div id="orbit-info"></div>
    </div>
    <input type="file" id="csv-file-input" accept=".csv,.txt" style="display: none" />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
