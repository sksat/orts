body: earth
dt: 0.01
output_interval: 1.0
duration: 120.0

satellites:
  - id: controlled-sat
    orbit:
      type: circular
      altitude: 400
    attitude:
      inertia_diag: [10, 10, 10]
      mass: 500
      initial_quaternion: [0.966, 0, 0.259, 0]  # ~30 deg about Y
      initial_angular_velocity: [0.02, -0.01, 0.015]
    controller:
      type: wasm
      path: plugins/pd-rw-control/target/wasm32-wasip1/release/orts_example_plugin_pd_rw_control.wasm
      config:
        kp: 1.0
        kd: 2.0
        sample_period: 0.1
    sensors:
      - gyroscope
      - star_tracker
    reaction_wheels:
      type: three_axis
      inertia: 0.01
      max_momentum: 1.0
      max_torque: 0.5
