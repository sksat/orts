name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write # softprops/action-gh-release (rust-dist, tag push only)

jobs:
  # Code quality checks: Rust (fmt, clippy) + TypeScript (biome).
  # clippy requires compilation, which overlaps with rust-build — accepted
  # trade-off for clear "lint = code quality" responsibility separation.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          components: clippy, rustfmt

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --workspace -- -D warnings

      - name: Clippy (tobari wasm)
        run: cargo clippy --locked -p tobari --features wasm -- -D warnings

      # Contract check: `orts` must still build with the sync-only
      # WASM backend (`plugin-wasm` without `plugin-wasm-async`). The
      # workspace default pulls `plugin-wasm-async` in via the CLI's
      # default features, so regressions to sync-only `#[cfg]` gates
      # would not be caught otherwise.
      - name: Clippy (orts sync-only plugin-wasm)
        run: cargo clippy --locked -p orts --no-default-features --features plugin-wasm -- -D warnings

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: "package.json"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm exec biome lint .

  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      # Standard ubuntu-latest runners ship with only ~14 GB of free
      # disk. The orts workspace (rerun + wasmtime with async feature
      # + criterion benches + 50+ transitive crates) fills that during
      # the link phase of `cargo test --workspace --no-run`, so we
      # reclaim ~17 GB by removing runtimes we don't need (Android,
      # .NET, Haskell, Docker). Large-packages is intentionally off
      # because it would also remove LLVM/clang, which our
      # `.cargo/config.toml` uses as the linker driver for mold.
      # Tool-cache is kept so setup-rust / setup-node stay hot, and
      # swap is kept because the linker occasionally peaks memory.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: rust-native
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build workspace
        run: cargo test --locked --workspace --no-run

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7.0.0
        with:
          name: orts-cli-debug
          path: target/debug/orts
          retention-days: 1

  # Reuses cargo cache from rust-build via shared-key to skip recompilation.
  # Split into two jobs: orts (heavy, ~20 min) runs alone while all
  # other crates share a single job (~3 min). New crates are
  # automatically included via --workspace.
  rust-test:
    runs-on: ubuntu-latest
    needs: [rust-build]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: rust-native
          save-if: false

      - name: Test (all except orts)
        run: cargo test --locked --workspace --exclude orts

  # orts unit tests + doc tests + example unit tests (lightweight).
  rust-test-orts:
    runs-on: ubuntu-latest
    needs: [rust-build]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: rust-native
          save-if: false

      - name: Test (orts unit + examples)
        run: cargo test --locked -p orts --lib --examples

      - name: Test (orts doc)
        run: cargo test --locked -p orts --doc

  # orts integration tests (heavy — each test propagates a
  # full simulation). Runs in parallel with the lightweight orts job.
  rust-test-orts-integration:
    runs-on: ubuntu-latest
    needs: [rust-build]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: rust-native
          save-if: false

      - name: Test (orts integration)
        run: cargo test --locked -p orts --tests

  # Plugin-wasm guest tests: build the bdot + pd-rw-control guest
  # components with cargo-component, then run the feature-gated
  # Rust integration tests that need a real WASM guest at runtime
  # (oracle sync↔async bit-exact, multi-sat scale, async context
  # safety). Separate from rust-test because it needs cargo-component
  # and a WASM target, and the signal "host API broke" is distinct
  # from "guest-facing ABI broke".
  rust-test-plugin-wasm:
    runs-on: ubuntu-latest
    needs: [rust-build]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          targets: wasm32-wasip1

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: rust-native
          save-if: false

      - name: Install cargo-component
        uses: taiki-e/install-action@7a4939c09608b2a1986b484eca1d16fd0db8ebef # v2.75.5
        with:
          tool: cargo-component

      - name: Build guest WASM components
        run: |
          (cd plugins/bdot-finite-diff && cargo component build --release)
          (cd plugins/pd-rw-control && cargo component build --release)

      - name: Run plugin-wasm integration tests
        run: |
          cargo test --locked -p orts --features plugin-wasm-async \
            --test oracle_plugin_wasm_bdot \
            --test oracle_plugin_wasm_pd_rw \
            --test wasm_async_backend \
            --test block_on_from_spawn_blocking

  # CLI plugin-backend E2E: downloads the orts binary artifact built
  # by rust-build and exercises `orts run --plugin-backend=sync|async`
  # via subprocess. Mirrors the viewer-e2e pattern of "use the actual
  # shipped binary for end-to-end verification" rather than rebuilding
  # with cargo test. The test harness itself is still a Rust file
  # driven by cargo test, but the binary under test is injected via
  # the ORTS_BIN environment variable.
  cli-plugin-backend-e2e:
    runs-on: ubuntu-latest
    needs: [rust-build]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          targets: wasm32-wasip1

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: rust-native
          save-if: false

      - name: Install cargo-component
        uses: taiki-e/install-action@7a4939c09608b2a1986b484eca1d16fd0db8ebef # v2.75.5
        with:
          tool: cargo-component

      - name: Build guest WASM components
        run: |
          (cd plugins/pd-rw-control && cargo component build --release)

      - name: Download orts binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: orts-cli-debug
          path: ./bin

      - name: Make orts binary executable
        run: chmod +x ./bin/orts

      - name: Run CLI plugin-backend E2E
        env:
          ORTS_BIN: ${{ github.workspace }}/bin/orts
        run: |
          cargo test --locked -p orts-cli --test plugin_backend_e2e
          cargo test --locked -p orts-cli --test serve_dynamic_controlled_add_e2e
          cargo test --locked -p orts-cli --test throughput_mode_speedup_e2e
          cargo test --locked -p orts-cli --test e2e test_controlled_simulation_via_config

  # Build CLI with embedded viewer SPA in release profile.
  # Runs on main push (smoke test) AND tag push (release job consumes
  # the artifact). On PRs, build.rs falls back to a placeholder —
  # viewer embedding breakage is detected post-merge, not pre-merge.
  # Build CLI release binary for each target. Matrix produces one
  # artifact per target that the release job assembles into tarballs.
  rust-dist:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [rust-build, viewer-build]
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Install mold linker
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get install -y mold

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: rust-release-${{ matrix.target }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-about
        uses: taiki-e/install-action@7a4939c09608b2a1986b484eca1d16fd0db8ebef # v2.75.5
        with:
          tool: cargo-about

      - name: Download viewer dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: viewer-dist
          path: ./viewer/dist

      - name: Build CLI with embedded viewer (release)
        env:
          ORTS_REQUIRE_LICENSE_NOTICE: "1"
        run: cargo build --locked --release -p orts-cli --target ${{ matrix.target }}

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7.0.0
        with:
          name: orts-cli-release-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/orts
          retention-days: 1

  # Verify crate package contents before release. Runs on a clean
  # checkout (no downloaded artifacts) so --allow-dirty is not needed.
  crate-package-verify:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}

      - name: List crate package contents
        run: |
          mkdir -p /tmp/crate-pkg
          for toml in */Cargo.toml plugin-sdk/Cargo.toml; do
            crate=$(awk -F'"' '/^name[[:space:]]*=/ {print $2; exit}' "$toml")
            [ -z "$crate" ] && continue
            if cargo package --list -p "$crate" > "/tmp/crate-pkg/${crate}.txt" 2>/dev/null; then
              echo "--- $crate ($(wc -l < /tmp/crate-pkg/${crate}.txt) files) ---"
              cat "/tmp/crate-pkg/${crate}.txt"
            else
              echo "--- $crate (skipped: deps not on crates.io) ---"
              rm -f "/tmp/crate-pkg/${crate}.txt"
            fi
          done

      - name: Verify no unexpected files in crate packages
        run: |
          BAD_PATTERNS='\.venv/|__pycache__|\.pytest_cache|node_modules|\.DS_Store'
          FAIL=0
          for f in /tmp/crate-pkg/*.txt; do
            crate=$(basename "$f" .txt)
            bad=$(grep -E "$BAD_PATTERNS" "$f" || true)
            if [ -n "$bad" ]; then
              echo "::error::Unexpected files in $crate tarball:"
              echo "$bad"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] && echo "All crate package contents clean."
          exit $FAIL

  # Build example WASM plugin guests for inclusion in the release tarball.
  build-example-plugins:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          targets: wasm32-wasip1

      - name: Install cargo-component
        uses: taiki-e/install-action@7a4939c09608b2a1986b484eca1d16fd0db8ebef # v2.75.5
        with:
          tool: cargo-component

      - name: Build example WASM plugins
        run: |
          for dir in plugins/*/; do
            [ -f "$dir/Cargo.toml" ] || continue
            echo "Building $(basename "$dir")..."
            (cd "$dir" && cargo component build --release)
          done

      - name: Upload example plugins
        uses: actions/upload-artifact@v7.0.0
        with:
          name: example-plugins
          path: plugins/*/target/wasm32-wasip1/release/orts_example_plugin_*.wasm
          retention-days: 1

  starlight-rustdoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: "package.json"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter starlight-rustdoc build

      - name: Test
        run: pnpm --filter starlight-rustdoc test

  uneri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: "package.json"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter uneri build

      - name: Test
        run: pnpm --filter uneri test

      - name: Upload dist
        uses: actions/upload-artifact@v7.0.0
        with:
          name: uneri-dist
          path: uneri/dist/
          retention-days: 1

  viewer-build:
    runs-on: ubuntu-latest
    needs: [uneri]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: wasm-viewer
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: "package.json"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uneri dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: uneri-dist
          path: ./uneri/dist

      - name: Build viewer
        run: pnpm --filter orts-viewer build

      - name: Test viewer
        run: pnpm --filter orts-viewer test

      - name: Upload viewer dist
        uses: actions/upload-artifact@v7.0.0
        with:
          name: viewer-dist
          path: viewer/dist/
          retention-days: 1

  tobari-example-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: "package.json"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter tobari-example-web build

      - name: Test
        run: pnpm --filter tobari-example-web test

  uneri-e2e:
    runs-on: ubuntu-latest
    needs: [uneri]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: "package.json"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uneri dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: uneri-dist
          path: ./uneri/dist

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: uneri
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: uneri
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E
        working-directory: uneri
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: uneri-playwright-report
          path: uneri/test-results/
          retention-days: 7

  viewer-e2e:
    runs-on: ubuntu-latest
    needs: [rust-build, uneri]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Parse rust-toolchain.toml
        id: rust-toolchain
        uses: ./.github/actions/parse-rust-toolchain

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: wasm-viewer
          save-if: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: "package.json"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uneri dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: uneri-dist
          path: ./uneri/dist

      - name: Build WASM
        run: pnpm --filter orts-viewer build:wasm

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: viewer
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: viewer
        run: npx playwright install-deps chromium

      - name: Download CLI binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: orts-cli-debug
          path: ./bin

      - name: Make CLI binary executable
        run: chmod +x ./bin/orts

      - name: Start WebSocket server
        run: ./bin/orts serve --sat altitude=400 --dt 1 --output-interval 10 &

      - name: Wait for WebSocket server
        run: |
          for _ in $(seq 1 60); do
            if nc -z localhost 9001 2>/dev/null; then
              echo "WebSocket server ready"
              exit 0
            fi
            sleep 1
          done
          echo "WebSocket server failed to start"
          exit 1

      - name: Start Vite dev server
        run: VITE_WS_URL=ws://localhost:9001/ws pnpm --filter orts-viewer dev &

      - name: Wait for Vite server
        run: |
          for _ in $(seq 1 60); do
            if curl -sf --max-time 2 http://localhost:5173/ -o /dev/null; then
              echo "Vite server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Vite server failed to start"
          exit 1

      - name: Run Playwright E2E
        working-directory: viewer
        run: npx playwright test
        env:
          VIEWER_PORT: "5173"
          ORTS_WS_URL: "ws://localhost:9001/ws"
          ORTS_BINARY: "${{ github.workspace }}/bin/orts"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: viewer-playwright-report
          path: viewer/test-results/
          retention-days: 7

  # Verify that npm packages can be published. Runs after build jobs
  # so dist/ artifacts are available. Catches metadata issues, missing
  # files, and registry misconfigurations before release.
  npm-publish-dry-run:
    runs-on: ubuntu-latest
    needs: [uneri, starlight-rustdoc]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: "package.json"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uneri dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: uneri-dist
          path: ./uneri/dist

      - name: Build starlight-rustdoc
        run: pnpm --filter starlight-rustdoc build

      - name: Publish dry-run (uneri)
        run: pnpm --filter uneri publish --dry-run --no-git-checks --registry https://registry.npmjs.org/

      - name: Publish dry-run (starlight-rustdoc)
        run: pnpm --filter starlight-rustdoc publish --dry-run --no-git-checks --registry https://registry.npmjs.org/

  # ── Release (tag push only) ──────────────────────────────────
  # Package the release binary and create a draft GitHub Release.
  # Downloads the artifact from rust-dist — the released binary is the
  # exact same one that CI built and validated.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [rust-dist, build-example-plugins, crate-package-verify, npm-publish-dry-run, rust-test, rust-test-orts, rust-test-orts-integration, rust-test-plugin-wasm, viewer-e2e, cli-plugin-backend-e2e]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          sparse-checkout: |
            README.md
            LICENSE
            Cargo.toml
            CHANGELOG.md
            CHANGELOG.ja.md

      - name: Extract version from tag
        id: version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.toml version matches tag
        run: |
          set -euo pipefail
          CARGO_VERSION=$(awk -F'"' '
            /^\[workspace\.package\]/ { in_wp = 1; next }
            /^\[/ { in_wp = 0 }
            in_wp && /^version[[:space:]]*=/ { print $2; exit }
          ' Cargo.toml)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "${CARGO_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match Cargo.toml workspace version (${CARGO_VERSION})"
            exit 1
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section between ## [VERSION] and the next ## [.
          # Two-pass: first try the exact version heading, then fall back
          # to [Unreleased] if no version-specific section exists.
          extract_section() {
            local file="$1" heading="$2"
            awk -v heading="$heading" '
              BEGIN { found=0 }
              /^## \[/ {
                if (found) exit
                if ($0 ~ "\\[" heading "\\]") found=1
                next
              }
              found { print }
            ' "$file"
          }
          # English
          BODY_EN=$(extract_section CHANGELOG.md "$VERSION")
          if [ -z "$BODY_EN" ]; then
            BODY_EN=$(extract_section CHANGELOG.md "Unreleased")
          fi
          echo "$BODY_EN" > /tmp/changelog-en.txt
          # Japanese
          BODY_JA=""
          if [ -f CHANGELOG.ja.md ]; then
            BODY_JA=$(extract_section CHANGELOG.ja.md "$VERSION")
            if [ -z "$BODY_JA" ]; then
              BODY_JA=$(extract_section CHANGELOG.ja.md "Unreleased")
            fi
          fi
          echo "$BODY_JA" > /tmp/changelog-ja.txt
          echo "Extracted EN=$(wc -l < /tmp/changelog-en.txt) JA=$(wc -l < /tmp/changelog-ja.txt) lines"

      - name: Download example plugins
        uses: actions/download-artifact@v8.0.1
        with:
          name: example-plugins
          path: ./plugins-wasm

      - name: Download CLI binary (gnu)
        uses: actions/download-artifact@v8.0.1
        with:
          name: orts-cli-release-x86_64-unknown-linux-gnu
          path: ./bin-gnu

      - name: Download CLI binary (musl)
        uses: actions/download-artifact@v8.0.1
        with:
          name: orts-cli-release-x86_64-unknown-linux-musl
          path: ./bin-musl

      - name: Create tarballs and checksums
        id: assets
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ALL_FILES=""

          for TARGET in x86_64-unknown-linux-gnu x86_64-unknown-linux-musl; do
            # Pick the right binary
            case "$TARGET" in
              *gnu)  BIN_DIR=bin-gnu ;;
              *musl) BIN_DIR=bin-musl ;;
            esac

            STAGE_DIR="orts-cli-${VERSION}-${TARGET}"
            mkdir -p "${STAGE_DIR}/examples/plugins"

            cp "${BIN_DIR}/orts" "${STAGE_DIR}/orts"
            chmod +x "${STAGE_DIR}/orts"
            strip "${STAGE_DIR}/orts"
            cp README.md "${STAGE_DIR}/README.md"
            cp LICENSE "${STAGE_DIR}/LICENSE"

            # Rename plugin wasm files: strip orts_example_plugin_ prefix, use hyphens
            for f in $(find plugins-wasm -name 'orts_example_plugin_*.wasm' -not -path '*/deps/*'); do
              base=$(basename "$f" .wasm)
              short=$(echo "$base" | sed 's/^orts_example_plugin_//' | tr '_' '-')
              cp "$f" "${STAGE_DIR}/examples/plugins/${short}.wasm"
            done

            # Create tarball
            ARCHIVE="${STAGE_DIR}.tar.gz"
            tar --sort=name \
                --owner=0 --group=0 --numeric-owner \
                --mtime='UTC 2020-01-01' \
                -czf "${ARCHIVE}" "${STAGE_DIR}"
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
            cat "${ARCHIVE}.sha256"

            # Standalone binary
            BINARY="orts-${TARGET}"
            cp "${STAGE_DIR}/orts" "${BINARY}"

            ALL_FILES="${ALL_FILES}${ARCHIVE}\n${ARCHIVE}.sha256\n${BINARY}\n"
          done

          echo -e "$ALL_FILES" > /tmp/release-files.txt
          cat /tmp/release-files.txt

      - name: Build release body
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          cat > /tmp/release-body.md <<BODY
          ## What's Changed

          $(cat /tmp/changelog-en.txt)

          <details><summary>日本語 / Japanese</summary>

          $(cat /tmp/changelog-ja.txt)

          </details>

          ## Installation (cargo-binstall)

          \`\`\`
          cargo binstall --git https://github.com/sksat/orts orts-cli --version ${VERSION}
          \`\`\`

          ## Manual install

          Download the tarball for your platform, verify with the \`.sha256\` sidecar, extract, and run \`./orts\`.

          Targets:
          - \`x86_64-unknown-linux-gnu\` (glibc, dynamically linked)
          - \`x86_64-unknown-linux-musl\` (musl, fully static)
          BODY
          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' /tmp/release-body.md

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body_path: /tmp/release-body.md
          files: |
            orts-cli-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz
            orts-cli-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz.sha256
            orts-x86_64-unknown-linux-gnu
            orts-cli-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz
            orts-cli-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz.sha256
            orts-x86_64-unknown-linux-musl
            README.md
            LICENSE
