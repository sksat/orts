name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Code quality checks: Rust (fmt, clippy) + TypeScript (biome).
  # clippy requires compilation, which overlaps with rust-build — accepted
  # trade-off for clear "lint = code quality" responsibility separation.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Clippy (tobari wasm)
        run: cargo clippy -p tobari --features wasm -- -D warnings

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm exec biome lint .

  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build (test targets)
        run: cargo test --workspace --no-run

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7.0.0
        with:
          name: orts
          path: target/debug/orts
          retention-days: 1

  # Independent test execution — rebuilds from cargo cache, not from
  # rust-build artifacts (target dir is ~19GB, too large for artifacts).
  # Runs in parallel so it doesn't affect the critical path.
  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: false

      - name: Test
        run: cargo test --workspace

  # Build CLI with embedded viewer SPA (main only).
  # On PRs, build.rs falls back to a placeholder — viewer embedding
  # breakage is detected post-merge, not pre-merge. This is an accepted
  # trade-off to keep the PR critical path short (~390s vs ~785s).
  rust-dist:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [rust-build, viewer-build]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: false

      - name: Download viewer dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: viewer-dist
          path: ./viewer/dist

      - name: Build CLI with embedded viewer
        run: cargo build -p orts-cli

  uneri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter uneri build

      - name: Test
        run: pnpm --filter uneri test

      - name: Upload dist
        uses: actions/upload-artifact@v7.0.0
        with:
          name: uneri-dist
          path: uneri/dist/
          retention-days: 1

  viewer-build:
    runs-on: ubuntu-latest
    needs: [uneri]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uneri dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: uneri-dist
          path: ./uneri/dist

      - name: Build viewer
        run: pnpm --filter orts-viewer build

      - name: Test viewer
        run: pnpm --filter orts-viewer test

      - name: Upload viewer dist
        uses: actions/upload-artifact@v7.0.0
        with:
          name: viewer-dist
          path: viewer/dist/
          retention-days: 1

  tobari-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter tobari-web build

      - name: Test
        run: pnpm --filter tobari-web test

  uneri-e2e:
    runs-on: ubuntu-latest
    needs: [uneri]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uneri dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: uneri-dist
          path: ./uneri/dist

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: uneri
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: uneri
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E
        working-directory: uneri
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: uneri-playwright-report
          path: uneri/test-results/
          retention-days: 7

  viewer-e2e:
    runs-on: ubuntu-latest
    needs: [rust-build, uneri]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uneri dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: uneri-dist
          path: ./uneri/dist

      - name: Build WASM
        run: pnpm --filter orts-viewer build:wasm

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: viewer
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: viewer
        run: npx playwright install-deps chromium

      - name: Download CLI binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: orts
          path: ./bin

      - name: Make CLI binary executable
        run: chmod +x ./bin/orts

      - name: Start WebSocket server
        run: ./bin/orts serve --sat altitude=400 --dt 1 --output-interval 10 &

      - name: Wait for WebSocket server
        run: |
          for _ in $(seq 1 60); do
            if nc -z localhost 9001 2>/dev/null; then
              echo "WebSocket server ready"
              exit 0
            fi
            sleep 1
          done
          echo "WebSocket server failed to start"
          exit 1

      - name: Start Vite dev server
        run: VITE_WS_URL=ws://localhost:9001/ws pnpm --filter orts-viewer dev &

      - name: Wait for Vite server
        run: |
          for _ in $(seq 1 60); do
            if curl -sf --max-time 2 http://localhost:5173/ -o /dev/null; then
              echo "Vite server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Vite server failed to start"
          exit 1

      - name: Run Playwright E2E
        working-directory: viewer
        run: npx playwright test
        env:
          VIEWER_PORT: "5173"
          ORTS_WS_URL: "ws://localhost:9001/ws"
          ORTS_BINARY: "${{ github.workspace }}/bin/orts"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: viewer-playwright-report
          path: viewer/test-results/
          retention-days: 7
