name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7.0.0
        with:
          name: orts
          path: target/debug/orts
          retention-days: 1

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build uneri
        run: pnpm --filter uneri build

      - name: Build viewer
        run: pnpm --filter orts-viewer build

      - name: Test uneri
        run: pnpm --filter uneri test

      - name: Test viewer
        run: pnpm --filter orts-viewer test

  uneri-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build uneri
        run: pnpm --filter uneri build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: uneri
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: uneri
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E
        working-directory: uneri
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: uneri-playwright-report
          path: uneri/test-results/
          retention-days: 7

  viewer-e2e:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build uneri
        run: pnpm --filter uneri build

      - name: Build kaname WASM
        run: pnpm --filter orts-viewer build:wasm

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: viewer
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: viewer
        run: npx playwright install-deps chromium

      - name: Download CLI binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: orts
          path: ./bin

      - name: Make CLI binary executable
        run: chmod +x ./bin/orts

      - name: Start WebSocket server
        run: ./bin/orts serve --sat altitude=400 --dt 1 --output-interval 10 &

      - name: Wait for WebSocket server
        run: |
          for _ in $(seq 1 30); do
            if nc -z localhost 9001 2>/dev/null; then
              echo "WebSocket server ready"
              exit 0
            fi
            sleep 1
          done
          echo "WebSocket server failed to start"
          exit 1

      - name: Start Vite dev server
        run: pnpm --filter orts-viewer dev &

      - name: Wait for Vite server
        run: |
          for _ in $(seq 1 30); do
            if nc -z localhost 5173 2>/dev/null; then
              echo "Vite server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Vite server failed to start"
          exit 1

      - name: Run Playwright E2E
        working-directory: viewer
        run: npx playwright test
        env:
          VIEWER_PORT: "5173"
          ORTS_WS_URL: "ws://localhost:9001"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: viewer-playwright-report
          path: viewer/test-results/
          retention-days: 7
