[workspace]
resolver = "2"
members = [
    "integrator",
    "orbits",
    "kaname",
    "cli",
    "datamodel",
    "atmosphere",
]

[workspace.package]
version = "0.0.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/sksat/orts"

[workspace.dependencies]
orts-integrator = { path = "integrator" }
orts-orbits = { path = "orbits" }
kaname = { path = "kaname" }
orts-datamodel = { path = "datamodel" }
tobari = { path = "atmosphere" }
nalgebra = "0.34"
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = "0.26"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures-util = "0.3"
rerun = { version = "0.29", default-features = false, features = ["sdk"] }
ureq = "3"
